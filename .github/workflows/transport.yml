name: CPI Transport Manager

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation"
        required: true
        default: "transport"
        type: choice
        options:
          - transport
          - sync-config

      iflow:
        description: "Integration Flow"
        required: true

      source:
        description: "Source Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - ppd
          - prod

      target:
        description: "Target Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - dev
          - qa
          - ppd
          - prod

      updateConfiguration:
        description: "Update Configuration"
        required: true
        default: true
        type: boolean

      deploy:
        description: "Deploy After Transport"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  transport:
    runs-on: ubuntu-latest

    env:
      DEV_HOST: ${{ secrets.DEV_HOST }}
      DEV_TOKEN_URL: ${{ secrets.DEV_TOKEN_URL }}
      DEV_CLIENT_ID: ${{ secrets.DEV_CLIENT_ID }}
      DEV_CLIENT_SECRET: ${{ secrets.DEV_CLIENT_SECRET }}

      QA_HOST: ${{ secrets.QA_HOST }}
      QA_TOKEN_URL: ${{ secrets.QA_TOKEN_URL }}
      QA_CLIENT_ID: ${{ secrets.QA_CLIENT_ID }}
      QA_CLIENT_SECRET: ${{ secrets.QA_CLIENT_SECRET }}

      PPD_HOST: ${{ secrets.PPD_HOST }}
      PPD_TOKEN_URL: ${{ secrets.PPD_TOKEN_URL }}
      PPD_CLIENT_ID: ${{ secrets.PPD_CLIENT_ID }}
      PPD_CLIENT_SECRET: ${{ secrets.PPD_CLIENT_SECRET }}

      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_TOKEN_URL: ${{ secrets.PROD_TOKEN_URL }}
      PROD_CLIENT_ID: ${{ secrets.PROD_CLIENT_ID }}
      PROD_CLIENT_SECRET: ${{ secrets.PROD_CLIENT_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Project
        run: mvn clean package

      - name: Run Transport Manager
        run: |
          java \
          -Doperation=${{ github.event.inputs.operation }} \
          -Diflow=${{ github.event.inputs.iflow }} \
          -Dsource=${{ github.event.inputs.source }} \
          -Dtarget=${{ github.event.inputs.target }} \
          -DupdateConfiguration=${{ github.event.inputs.updateConfiguration }} \
          -Ddeploy=${{ github.event.inputs.deploy }} \
          -jar target/transport-manager.jar

      - name: Commit Generated Configuration Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No configuration changes."
          else
            git commit -m "Update configuration templates"
            git push
          fi